    <title>Certificates</title>

    <style>
        /* Remove bullet points completely */
        .course-list {
            list-style: none !important;
            padding-left: 0 !important;
            margin: 0;
        }

        .course-list li {
            list-style: none !important;
            margin-bottom: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            transition: background 0.2s ease;
        }

        .course-list li:hover {
            background: #e0ecff;
        }

        .course-list a {
            text-decoration: none;
            color: #1e293b;
            font-size: 15px;
        }

        .course-list a:hover {
            color: #4f7cac;
        }
    </style>
</head>
